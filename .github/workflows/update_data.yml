# =============================================================================
# update_data.yml — AI 商情雷达 · GitOps 自动数据管道
# 职责：每日 3 次定时抓取 → DeepSeek 分析 → 自动提交/推送数据文件
# =============================================================================

name: Auto Fetch & Analyze

on:
  schedule:
    # 北京时间 上午 09:40 → UTC 01:40 — 捕捉美股夜盘收盘与 A 股开盘动量
    - cron: '40 1 * * 1-5'
    # 北京时间 下午 15:15 → UTC 07:15 — A 股收盘全量大结算与自动邮件日报发送
    - cron: '15 7 * * 1-5'
    # 北京时间 晚上 21:40 → UTC 13:40 — 监控美股日内开盘最新宏观信心气压
    - cron: '40 13 * * 1-5'

  # 允许在 GitHub 页面手动触发
  workflow_dispatch:

# 需要写入权限才能将数据文件 push 回仓库
permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run data pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: npm run pipeline

      - name: Commit and push changes
        run: |
          git config user.name "ai-news-radar[bot]"
          git config user.email "bot@ai-news-radar.local"
          git add -f src/data/latest.json
          git add src/data/
          git diff --staged --quiet || (git commit -m "chore: auto updated marketing radar data [skip ci]" && git push)
